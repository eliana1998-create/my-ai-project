<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ballet AI - Pose Detector</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f0f0f0;
    transition: background-color 0.5s ease;
}

canvas {
    border: 2px solid #333;
    margin-top: 10px;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    font-size: 1em;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: #333;
    color: white;
}

#label-container div {
    margin: 5px auto;
    font-weight: bold;
    font-size: 1em;
    width: 250px;
}

#currentPose {
    font-size: 2em;
    margin-top: 15px;
    color: #222;
}
</style>
</head>

<body>

<h2>💃 Ballet Pose Detector AI</h2>

<button id="startBtn">Iniciar Cámara</button>

<h1 id="currentPose">Esperando pose...</h1>

<div>
    <canvas id="canvas"></canvas>
</div>

<div id="label-container"></div>
<div id="error-message"></div>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<script>
const URL = "./my_model/";

let model, webcam, ctx, labelContainer, maxPredictions;

document.getElementById('startBtn').addEventListener('click', init);

async function init() {
    const errorMessage = document.getElementById('error-message');
    errorMessage.innerHTML = "";

    try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        webcam = new tmPose.Webcam(400, 400, true);
        await webcam.setup();
        await webcam.play();

        window.requestAnimationFrame(loop);

        const canvas = document.getElementById("canvas");
        canvas.width = 400;
        canvas.height = 400;
        ctx = canvas.getContext("2d");

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

    } catch(err) {
        console.error(err);
        errorMessage.innerHTML = "Error al iniciar cámara o modelo.";
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
    const prediction = await model.predict(posenetOutput);

    // 🔥 encontrar mejor pose
    let best = prediction[0];

    for (let i = 1; i < prediction.length; i++) {
        if (prediction[i].probability > best.probability) {
            best = prediction[i];
        }
    }

    // 💃 mostrar pose principal
    document.getElementById("currentPose").innerText =
        "Pose actual: " + best.className;

    // 🌈 cambiar fondo según pose
    let pose = best.className;

    if (pose === "pose 1") document.body.style.background = "#ffeaa7";
    else if (pose === "pose 2") document.body.style.background = "#81ecec";
    else if (pose === "pose 3") document.body.style.background = "#fab1a0";
    else if (pose === "pose 4") document.body.style.background = "#a29bfe";
    else if (pose === "pose 5") document.body.style.background = "#55efc4";
    else document.body.style.background = "#dfe6e9";

    // 📊 mostrar todas las predicciones
    for (let i = 0; i < maxPredictions; i++) {

        const className = prediction[i].className;
        const prob = prediction[i].probability;

        let color = "#333";

        if (className === "pose 1") color = "#ff6b6b";
        if (className === "pose 2") color = "#feca57";
        if (className === "pose 3") color = "#48dbfb";
        if (className === "pose 4") color = "#1dd1a1";
        if (className === "pose 5") color = "#5f27cd";
        if (className === "pose") color = "#999";

        labelContainer.childNodes[i].innerHTML = `
            <div style="
                padding:8px;
                background:${color};
                color:white;
                border-radius:10px;
            ">
                ${className}: ${prob.toFixed(2)}
            </div>
        `;
    }

    drawPose(pose);
}

function drawPose(pose) {
    if (webcam.canvas) {
        ctx.drawImage(webcam.canvas, 0, 0);

        if (pose) {
            tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
            tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);
        }
    }
}
</script>

</body>
</html>
