<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pose de Ballet - Teachable Machine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }
        canvas {
            border: 2px solid #333;
            margin-top: 10px;
        }
        #label-container div {
            margin: 5px 0;
            font-weight: bold;
            font-size: 1.1em;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
        }
        #error-message {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Teachable Machine Pose Model - Ballet</h2>
    <button id="startBtn">Iniciar Cámara</button>

    <div>
        <canvas id="canvas"></canvas>
    </div>
    <div id="label-container"></div>
    <div id="error-message"></div>

    <!-- TensorFlow.js moderno y Teachable Machine Pose -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <script>
        const URL = "./my_model/";  // Debe coincidir con el nombre de la carpeta exacto
        let model, webcam, ctx, labelContainer, maxPredictions;

        document.getElementById('startBtn').addEventListener('click', init);

        async function init() {
            const errorMessage = document.getElementById('error-message');
            errorMessage.innerHTML = ""; // limpiar mensajes anteriores
            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                model = await tmPose.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // Configurar la webcam
                webcam = new tmPose.Webcam(400, 400, true);
                await webcam.setup(); // pedir acceso a la cámara
                await webcam.play();

                window.requestAnimationFrame(loop);

                // Configurar canvas
                const canvas = document.getElementById("canvas");
                canvas.width = 400;
                canvas.height = 400;
                ctx = canvas.getContext("2d");

                // Contenedor de predicciones
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }

            } catch(err) {
                console.error("Error al inicializar la cámara o el modelo:", err);
                errorMessage.innerHTML = "No se pudo iniciar la cámara o cargar el modelo. Revisa que la carpeta 'my_model' exista y tenga los archivos correctos.";
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }

            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
                    tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);
                }
            }
        }
    </script>
</body>
</html>
